<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhishGuard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0c0e0f;
    --surface: #131618;
    --border:  #242729;
    --text:    #e8eaeb;
    --muted:   #6b7075;
    --red:     #ff4d4d;
    --red-dim: #3d1a1a;
    --red-mid: #7a2828;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans);
  }

  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, #1a0d0d, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 80%, #0d1a10, transparent 60%),
      var(--bg);
  }

  .card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 16px; padding: 2.5rem; text-align: center;
    max-width: 340px; width: 100%;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-icon {
    width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 1.25rem;
    background: linear-gradient(135deg, #ff4d4d, #7a1f1f);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  h1 {
    font-family: var(--mono); font-size: 18px; font-weight: 500;
    margin-bottom: 6px;
  }
  h1 span { color: var(--red); }

  p {
    font-size: 13px; color: var(--muted);
    margin-bottom: 1.75rem; line-height: 1.6;
  }

  .login-btn {
    display: block; background: var(--red-dim); color: var(--red);
    border: 0.5px solid var(--red-mid); border-radius: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; padding: 12px 24px;
    text-decoration: none; transition: background 0.15s; margin-bottom: 1rem;
  }
  .login-btn:hover { background: #4d1e1e; }
  .back-link {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    letter-spacing: 0.06em; text-decoration: none; transition: color 0.15s;
  }
  .back-link:hover { color: var(--text); }
  .features-mini { margin-top: 1.75rem; border-top: 0.5px solid var(--border); padding-top: 1.5rem; text-align: left; }
  .feature-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.5;
  }
  .feature-row:last-child { margin-bottom: 0; }
  .feat-dot { color: var(--red); flex-shrink: 0; font-family: var(--mono); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-icon">🛡</div>
    <h1>Phish<span>Guard</span></h1>
    <p>Real-time phishing detection for your inbox.<br/>Connect your Gmail account to get started.</p>
    <a href="/login/" class="login-btn">LOGIN WITH GOOGLE</a>
    <a href="/" class="back-link">← BACK TO HOME</a>
    <div class="features-mini">
      <div class="feature-row"><span class="feat-dot">▸</span> Read-only Gmail access — we never modify your mail</div>
      <div class="feature-row"><span class="feat-dot">▸</span> Three-layer detection: headers, links, AI</div>
      <div class="feature-row"><span class="feat-dot">▸</span> Your tokens are stored securely in the local database</div>
    </div>
  </div>
</body>
</html>
