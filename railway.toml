[deploy]
startCommand = "gunicorn phishguard.wsgi --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
releaseCommand = "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py ensure_superuser && python manage.py seed_marketplace"
