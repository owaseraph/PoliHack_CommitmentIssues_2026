<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMail — Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg0:#070b14; --bg1:#0d1220; --bg2:#111828; --bg3:#172034;
    --border:#1e2d45; --text:#e2eaf4; --muted:#6b82a0; --dim:#3a4f6a;
    --blue:#3b82f6; --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
    --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  }

  html,body{height:100%;background:var(--bg0);color:var(--text);font-family:var(--font);}

  .app{display:flex;height:100vh;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:220px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;}
  .logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px;}
  .logo-mark{font-family:var(--mono);font-size:18px;font-weight:500;letter-spacing:-.5px;}
  .logo-mark span{color:var(--blue);}
  .logo-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .sidebar-nav{padding:0 10px;flex:1;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;margin-bottom:2px;user-select:none;}
  .nav-item:hover{background:var(--bg2);color:var(--text);}
  .nav-item.active{background:var(--bg3);color:var(--text);}
  .nav-item .icon{font-size:15px;width:18px;text-align:center;}
  .nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;}
  .sidebar-footer{padding:16px 20px 0;border-top:1px solid var(--border);}
  .av-row{display:flex;align-items:center;gap:10px;}
  .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
  .av-name{font-size:13px;font-weight:600;}
  .av-addr{font-size:11px;color:var(--muted);}

  /* Email list */
  .email-list{width:320px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .list-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .list-title{font-size:14px;font-weight:700;}
  .list-count{font-size:11px;color:var(--muted);}
  .search-bar{margin:10px 12px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;}
  .search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:12px;width:100%;}
  .search-bar input::placeholder{color:var(--dim);}
  .email-items{overflow-y:auto;flex:1;}
  .email-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative;}
  .email-item:hover{background:var(--bg2);}
  .email-item.active{background:var(--bg3);}
  .email-item.unread .item-subject{font-weight:700;}
  .unread-dot{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--blue);}
  .item-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
  .item-from{font-size:12px;font-weight:600;}
  .item-time{font-size:10px;color:var(--muted);font-family:var(--mono);}
  .item-subject{font-size:12px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Reader */
  .email-reader{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .reader-toolbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg1);}
  .tb-btn{padding:6px 12px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font);}
  .tb-btn:hover{color:var(--text);border-color:var(--dim);}
  .email-content{flex:1;overflow-y:auto;padding:32px 40px;}
  .email-meta{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .email-subject-line{font-size:20px;font-weight:700;margin-bottom:14px;line-height:1.3;}
  .meta-row{display:flex;align-items:flex-start;gap:12px;}
  .meta-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .meta-details{flex:1;}
  .meta-from{font-size:14px;font-weight:600;}
  .meta-from-email{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
  .meta-to{font-size:12px;color:var(--muted);margin-top:2px;}
  .meta-date{font-size:11px;color:var(--dim);font-family:var(--mono);margin-left:auto;}
  .email-body{font-size:14px;line-height:1.8;color:#c8d8e8;max-width:640px;}
  .email-body p{margin-bottom:16px;}
  .email-body a{color:var(--blue);text-decoration:underline;text-decoration-color:rgba(59,130,246,.4);}
  .email-body a:hover{text-decoration-color:var(--blue);}
  .email-body .cta{display:inline-block;margin:8px 0 16px;padding:11px 24px;border-radius:8px;background:var(--blue);color:#fff;font-weight:600;font-size:14px;text-decoration:none;transition:background .15s;}
  .email-body .cta:hover{background:#2563eb;}
  .email-body .cta.bad{background:linear-gradient(135deg,#b91c1c,#ef4444);}
  .email-body .sig{color:var(--muted);font-size:13px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:10px;}
  .empty-state .esi{font-size:40px;opacity:.4;}
  .empty-state p{font-size:13px;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">Nova<span>Mail</span></div>
      <div class="logo-sub">Secure workspace email</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active"><span class="icon">📥</span> Inbox <span class="nav-badge">4</span></div>
      <div class="nav-item"><span class="icon">⭐</span> Starred</div>
      <div class="nav-item"><span class="icon">📤</span> Sent</div>
      <div class="nav-item"><span class="icon">📁</span> Drafts</div>
      <div class="nav-item"><span class="icon">🗑️</span> Trash</div>
      <div class="nav-item"><span class="icon">⚠️</span> Spam</div>
    </nav>
    <div class="sidebar-footer">
      <div class="av-row">
        <div class="av">JD</div>
        <div>
          <div class="av-name">Jane Doe</div>
          <!-- NOTE: no email address here — avoid false positive on safe address -->
          <div class="av-addr">jane · novamail</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="email-list">
    <div class="list-header">
      <span class="list-title">Inbox</span>
      <span class="list-count">6 messages</span>
    </div>
    <div class="search-bar">
      <span style="color:var(--dim)">🔍</span>
      <input type="text" placeholder="Search mail…">
    </div>
    <!-- Email list items: NO links, NO email addresses, NO URLs in this DOM -->
    <div class="email-items" id="email-list"></div>
  </div>

  <main class="email-reader">
    <div class="reader-toolbar">
      <button class="tb-btn">← Back</button>
      <button class="tb-btn">Archive</button>
      <button class="tb-btn">Reply</button>
      <button class="tb-btn" style="margin-left:auto;color:var(--red);border-color:rgba(239,68,68,.3)">🗑 Delete</button>
    </div>
    <div class="empty-state" id="empty-state">
      <div class="esi">✉️</div>
      <p>Select a message to read</p>
    </div>
    <!-- Email body injected here only when opened -->
    <div id="email-body-wrap" style="display:none;flex:1;overflow-y:auto;">
      <div class="email-content" id="email-content"></div>
    </div>
  </main>

</div>
<script>
// All sensitive content (links, email addresses, URLs) lives only in JS strings.
// It enters the DOM exclusively when openEmail() is called.
// The list renders only sender names, subjects (no URLs), and safe preview text.

const EMAILS = [
  {
    id: 1, from: "GitHub", avatarBg: "#1f2937", avatarEmoji: "🐙",
    subject: "Your pull request was merged",
    listPreview: "PR #142 has been merged into main by team-lead",
    time: "10:24", unread: true,
    body: () => `
      <p>Hi Jane,</p>
      <p>Your pull request <strong>#142 — "Add dark mode support"</strong> was merged into <code>main</code>.</p>
      <a class="cta" href="https://github.com">View on GitHub →</a>
      <p>Thanks for your contribution!</p>
      <div class="sig">— The GitHub Team · github.com</div>`,
    fromEmailDisplay: "noreply · github.com",
  },
  {
    id: 2, from: "PayPal Security", avatarBg: "#1c0a00", avatarEmoji: "⚠️",
    subject: "Action required: Verify your account",
    listPreview: "We need to confirm your identity",
    time: "09:47", unread: true,
    body: () => `
      <p>Dear Valued Customer,</p>
      <p>We have detected <strong>unusual activity</strong> on your PayPal account. To protect you, your account has been <strong>temporarily suspended</strong>.</p>
      <p>Verify your identity within 24 hours or your account will be permanently closed.</p>
      <a class="cta bad" href="https://login-paypal-secure.xyz">Verify My Account Now →</a>
      <p>Contact support: <a href="mailto:support@paypal-secure-login.xyz">support@paypal-secure-login.xyz</a></p>
      <div class="sig">PayPal Security Team · paypal-secure-login.xyz</div>`,
    fromEmailDisplay: "security@paypal-secure-login.xyz",
  },
  {
    id: 3, from: "Stripe", avatarBg: "#0f1d3d", avatarEmoji: "💳",
    subject: "Your April invoice is ready",
    listPreview: "Invoice INV-2026-04 · $49.00 due April 30",
    time: "Yesterday", unread: false,
    body: () => `
      <p>Hi Jane,</p>
      <p>Your invoice for <strong>April 2026</strong> is now available.</p>
      <p>Invoice INV-2026-04 · $49.00 · due April 30, 2026</p>
      <a class="cta" href="https://stripe.com">View Invoice →</a>
      <p>Payment will be charged to your card ending in 4242.</p>
      <div class="sig">Stripe, Inc. · stripe.com</div>`,
    fromEmailDisplay: "support · stripe.com",
  },
  {
    id: 4, from: "IRS Refund Portal", avatarBg: "#1c1400", avatarEmoji: "💰",
    subject: "Federal tax refund pending — claim now",
    listPreview: "Your refund expires in 48 hours",
    time: "Yesterday", unread: true,
    body: () => `
      <p>Dear Taxpayer,</p>
      <p>Our records show you are eligible for a <strong>federal tax refund of $3,240.00</strong> for fiscal year 2025.</p>
      <p>Submit your banking details through our portal before the offer expires in <strong>48 hours</strong>.</p>
      <a class="cta bad" href="https://irs-gov-portal.net">Claim My Refund →</a>
      <p>Questions? Contact: <a href="mailto:refunds@irs-gov-portal.net">refunds@irs-gov-portal.net</a></p>
      <p>Track your status: <a href="https://track-package-now.ru">track-package-now.ru</a></p>
      <div class="sig">IRS Refund Department · irs-gov-portal.net</div>`,
    fromEmailDisplay: "info@irs-tax-refund-pending.com",
  },
  {
    id: 5, from: "Notion", avatarBg: "#111827", avatarEmoji: "📝",
    subject: "Alex shared a workspace with you",
    listPreview: "Q2 Planning — you've been added as Editor",
    time: "Mon", unread: false,
    body: () => `
      <p>Hi Jane,</p>
      <p><strong>Alex Chen</strong> invited you to collaborate on <strong>Q2 Planning</strong>.</p>
      <a class="cta" href="https://notion.so">Open Workspace →</a>
      <p>Ignore this if you weren't expecting it — no account will be created without confirmation.</p>
      <div class="sig">— The Notion Team · notion.so</div>`,
    fromEmailDisplay: "hello · notion.so",
  },
  {
    id: 6, from: "Apple Support", avatarBg: "#1c0000", avatarEmoji: "🍎",
    subject: "Your Apple ID has been locked",
    listPreview: "Verify your information to restore access",
    time: "Sun", unread: true,
    body: () => `
      <p>Dear Apple Customer,</p>
      <p>Your Apple ID was <strong>locked</strong> due to too many failed sign-in attempts.</p>
      <p>Verify your information within <strong>12 hours</strong> or your account and all iCloud data will be permanently deleted.</p>
      <a class="cta bad" href="https://appleid-locked-verify.com">Unlock My Apple ID →</a>
      <p>Apple Support: <a href="mailto:support@appleid-locked-verify.com">support@appleid-locked-verify.com</a></p>
      <div class="sig">Apple Support Team · appleid-locked-verify.com</div>`,
    fromEmailDisplay: "support@appleid-locked-verify.com",
  },
];

let activeId = null;

function renderList() {
  document.getElementById("email-list").innerHTML = EMAILS.map(e => `
    <div class="email-item${e.unread?" unread":""}${activeId===e.id?" active":""}"
         onclick="openEmail(${e.id})">
      ${e.unread?'<div class="unread-dot"></div>':""}
      <div class="item-row1">
        <span class="item-from">${e.from}</span>
        <span class="item-time">${e.time}</span>
      </div>
      <div class="item-subject">${e.subject}</div>
      <div class="item-preview">${e.listPreview}</div>
    </div>`).join("");
}

function openEmail(id) {
  const email = EMAILS.find(e => e.id === id);
  if (!email) return;
  activeId = id;
  email.unread = false;
  renderList();

  // Clear first — so PhishGuard never sees the old email's links alongside the new one
  const content = document.getElementById("email-content");
  content.innerHTML = "";

  document.getElementById("empty-state").style.display = "none";
  const wrap = document.getElementById("email-body-wrap");
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";

  // Now inject the email body — this triggers PhishGuard's MutationObserver
  content.innerHTML = `
    <div class="email-meta">
      <div class="email-subject-line">${email.subject}</div>
      <div class="meta-row">
        <div class="meta-avatar" style="background:${email.avatarBg}">${email.avatarEmoji}</div>
        <div class="meta-details">
          <div class="meta-from">${email.from}</div>
          <div class="meta-from-email">${email.fromEmailDisplay}</div>
          <div class="meta-to">To: jane</div>
        </div>
        <div class="meta-date">${email.time} · 2026</div>
      </div>
    </div>
    <div class="email-body">${email.body()}</div>`;
}

// Note: fromEmailDisplay for phishing emails shows the address as plain text
// so users can see it, but PhishGuard picks it up via the anchor hrefs in the body,
// not from the header display string (which has no mailto: link).

renderList();
</script>
</body>
</html>
